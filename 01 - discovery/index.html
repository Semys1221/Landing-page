<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Audit CGP - Montis Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #050505;
            --border: #1a1a1a;
            --border-hover: #0070f3;
            --accent-blue: #0070f3;
            --text-question: #ffffff;
            --text-answer: #888888;
            --font-main: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text-question);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            padding: 2.5rem;
            border-bottom: 1px solid var(--border);
            text-align: center;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 { font-size: 0.85rem; letter-spacing: 0.5rem; font-weight: 800; margin: 0 0 0.6rem 0; color: #fff; }
        header p { font-size: 0.6rem; color: var(--accent-blue); text-transform: uppercase; margin: 0; letter-spacing: 2px;}

        .progress-container {
            display: flex;
            justify-content: center;
            gap: 4px;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
        }

        .step-segment { height: 2px; flex: 1; background: var(--border); transition: 0.4s; }
        .step-segment.active { background: var(--accent-blue); box-shadow: 0 0 10px var(--accent-blue); }

        /* CARD STRUCTURE */
        .card {
            max-width: 650px;
            width: 90%;
            margin: 40px auto;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 4rem 3rem;
            border-radius: 4px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .question-id { 
            display: block; 
            font-size: 0.7rem; 
            color: var(--accent-blue); 
            margin-bottom: 1.5rem; 
            font-family: monospace;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* QUESTION STYLE */
        h2 { 
            font-size: 1.5rem; 
            font-weight: 400; 
            line-height: 1.5; 
            margin-bottom: 3rem; 
            color: #ffffff;
            letter-spacing: -0.02em;
            border-left: 2px solid var(--accent-blue);
            padding-left: 1.5rem;
        }

        /* STRIKE STYLE (Vérité brutale) */
        h2.strike-text {
            border-left: none;
            padding-left: 0;
            color: var(--accent-blue);
            font-style: italic;
            font-weight: 300;
            font-size: 1.8rem;
            text-align: center;
        }

        /* OPTIONS CONTAINER */
        .options { 
            display: flex; 
            flex-direction: column; 
            gap: 1.2rem;
            margin-top: 2rem;
        }

        /* BUTTONS / ANSWERS */
        button.option {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            color: #aaaaaa;
            padding: 1.4rem 1.5rem;
            text-align: left;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            border-radius: 2px;
            line-height: 1.4;
        }

        button.option:hover { 
            border-color: var(--accent-blue); 
            color: #ffffff; 
            background: rgba(0, 112, 243, 0.05);
            transform: translateX(8px);
        }

        button.option.center-btn {
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        
        button.option.center-btn:hover {
            transform: translateY(-2px);
        }

        /* RESULT VERDICT STYLES */
        .result-label { font-size: 0.8rem; color: var(--accent-blue); text-transform: uppercase; margin: 0 0 1rem 0; font-family: monospace; letter-spacing: 2px; }
        .verdict { font-size: 2.5rem; font-weight: 800; margin-bottom: 1.5rem; color: #ffffff; border:none; padding:0; text-transform: uppercase; font-style: italic;}
        .diagnostic-text { color: #dddddd; line-height: 1.8; margin-bottom: 3rem; font-size: 1.1rem; font-weight: 300;}

        .btn-primary { 
            background: var(--accent-blue); 
            color: white; 
            font-weight: 700; 
            text-align: center; 
            border: none;
            padding: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .btn-primary:hover {
            background: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 112, 243, 0.2);
        }

        .fade-slide { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        main { flex: 1; }
    </style>
</head>
<body>

    <header>
        <h1>MONTIS MEDIA</h1>
        <p>Master Audit CGP : Le Tally Balistique</p>
    </header>

    <div class="progress-container" id="progress"></div>
    
    <main id="app">
        <div id="intro-screen" class="fade-slide card">
            <span class="question-id">SYSTEM_STATUS: READY</span>
            <h2>Initialisation du protocole de qualification.</h2>
            <p class="diagnostic-text" style="font-size: 0.95rem; color: #888;">Cet audit a pour but d'identifier avec précision votre goulot d'étranglement actuel et de valider votre éligibilité à la Master Infrastructure.</p>
            <div class="options">
                <button class="option center-btn" onclick="startAudit()">[ DÉMARRER L'AUDIT ]</button>
            </div>
        </div>
    </main>

    <script>
        // La base de données de l'Audit (Questions, Réponses, Strikes et Résultat)
        const auditData = {
            questions: {
                "Q_START": {
                    tag: "ÉTAPE 1 : LE TRIAGE (THE AS-IS)",
                    text: "Julien, priorité de scale aujourd'hui : SOURCER plus de flux (Volume) ou FILTRER les dossiers chronophages (Qualité) ?",
                    options: [
                        { text: "J'ai besoin de plus de volume / de clients.", next: "Q_VOL_1" },
                        { text: "J'ai trop de petits dossiers / Je veux monter en gamme.", next: "Q_QUAL_1" }
                    ]
                },

                // --- BRANCHE VOLUME ---
                "Q_VOL_1": {
                    tag: "BRANCHE : LA DÉPENDANCE",
                    text: "Pourquoi le volume ? C'est ton réseau d'apporteurs qui s'atrophie, ou c'est toi qui veux scaler agressivement ton CA ?",
                    options: [
                        { text: "Mes apporteurs m'envoient moins de choses / Je dépends d'eux.", next: "S_VOL_A" },
                        { text: "Je veux scaler et grossir vite.", next: "S_VOL_B" }
                    ]
                },
                "S_VOL_A": {
                    tag: "ANALYSE SYSTÈME",
                    isStrike: true,
                    text: "Donc ton cabinet est sous respiration artificielle. Si ce robinet se coupe, tu survis combien de temps ? 3 mois ? 6 mois ?",
                    options: [{ text: "Continuer l'audit →", next: "Q_GAP_1" }]
                },
                "S_VOL_B": {
                    tag: "ANALYSE SYSTÈME",
                    isStrike: true,
                    text: "Ok. C'est quoi ton goulot d'étranglement pour scaler ? Ton temps de prospection manuel ou ton manque de process pour closer du froid ?",
                    options: [{ text: "Continuer l'audit →", next: "Q_GAP_1" }]
                },

                // --- BRANCHE QUALITÉ ---
                "Q_QUAL_1": {
                    tag: "BRANCHE : LE BURNOUT",
                    text: "C'est quoi le plus lourd au quotidien ? Les petits dossiers (TMI < 30%) qui bouffent ton temps, ou le fait de devoir 'prouver' ta valeur à des prospects froids ?",
                    options: [
                        { text: "Les petits dossiers me prennent trop de temps pour rien.", next: "S_QUAL_A" },
                        { text: "Je perds du temps à expliquer mon métier / Ils me comparent.", next: "S_QUAL_B" }
                    ]
                },
                "S_QUAL_A": {
                    tag: "ANALYSE SYSTÈME",
                    isStrike: true,
                    text: "Tu as fait un Bac+5 pour finir par faire du bénévolat social ? Honnêtement, quel pourcentage de ta semaine est cramé sur du prospect non-rentable ? 30% ? 50% ?",
                    options: [{ text: "Continuer l'audit →", next: "Q_GAP_1" }]
                },
                "S_QUAL_B": {
                    tag: "ANALYSE SYSTÈME",
                    isStrike: true,
                    text: "C'est un problème de 'Transfert d'Autorité'. Tu n'en as pas marre d'arriver en R1 et de passer pour un commercial au lieu d'être perçu comme l'Expert ?",
                    options: [{ text: "Continuer l'audit →", next: "Q_GAP_1" }]
                },

                // --- LE GAP ---
                "Q_GAP_1": {
                    tag: "ÉTAPE 2 : LE GAP (THE TO-BE)",
                    text: "Oublions la tuyauterie un instant. Si on fait sauter ton verrou actuel, tu vises quel palier de CA d'ici 12 mois pour te dire 'Ok, on a changé de dimension' ?",
                    options: [
                        { text: "+ 50k€ à 100k€", next: "S_GAP" },
                        { text: "+ 150k€ à 300k€", next: "S_GAP" },
                        { text: "+ 500k€ et plus", next: "S_GAP" }
                    ]
                },
                "S_GAP": {
                    tag: "ANALYSE SYSTÈME",
                    isStrike: true,
                    text: "Arithmétiquement, comment tu comptes aller chercher ça en gardant une méthode qui t'a pris des années pour arriver là ? C'est mathématiquement impossible sans une infrastructure externe.",
                    options: [{ text: "Passer au Qualif-Check →", next: "Q_LOG_1" }]
                },

                // --- LOGISTICS & MONEY ---
                "Q_LOG_1": {
                    tag: "ÉTAPE 3 : QUALIF-CHECK",
                    text: "Pour verrouiller ton exclusivité territoriale, on parle de 500 € de setup + un AdSpend de minimum 1000 €/mois. On est sur des chiffres qui te font transpirer, ou c'est totalement absorbable pour ton acquisition ?",
                    options: [
                        { text: "C'est absorbable / Pas de problème.", next: "Q_LOG_2" },
                        { text: "C'est un peu chaud / Faut voir le ROI / Je n'ai pas le budget.", next: "S_LOG_1" }
                    ]
                },
                "S_LOG_1": {
                    tag: "ANALYSE SYSTÈME",
                    isStrike: true,
                    text: "Julien, si investir 1500 balles dans ton propre moteur d'acquisition te fait peur, c'est que tu n'es pas prêt à scaler. Tu veux bricoler ou tu veux bâtir ?",
                    options: [{ text: "Continuer l'audit →", next: "Q_LOG_2" }]
                },

                "Q_LOG_2": {
                    tag: "ÉTAPE 4 : DÉCISION",
                    text: "Dernier point. Tu es le seul 'Master à bord' pour valider cette infrastructure ou tu dois demander la permission à un associé ?",
                    options: [
                        { text: "Je décide seul.", next: "RESULT_PITCH" },
                        { text: "J'ai un associé / Je dois en parler.", next: "S_LOG_2" }
                    ]
                },
                "S_LOG_2": {
                    tag: "ANALYSE SYSTÈME",
                    isStrike: true,
                    text: "Ok, mais si la mécanique fait sens pour TOI aujourd'hui, est-ce que tu as le pouvoir de dire 'GO' ou c'est lui qui signe les chèques ?",
                    options: [{ text: "Voir l'infrastructure →", next: "RESULT_PITCH" }]
                }
            },

            results: {
                "RESULT_PITCH": { 
                    tag: "DATA CONFIRMÉE", 
                    diag: "Julien, tu n'as pas besoin d'une agence de leads, tu as besoin de reprendre ta souveraineté. Laisse-moi te montrer comment fonctionne la Master Infrastructure.", 
                    cta: "DÉPLOYER LA MASTER INFRASTRUCTURE",
                    url: "authority.html"
                }
            }
        };

        // Variable globale pour suivre l'avancée (utilisé pour la barre de progression)
        let stepCount = 0;
        const totalStepsEst = 7; // Estimation du nombre de clics pour remplir la barre

        function startAudit() {
            stepCount = 1;
            updateProgress();
            render("Q_START");
        }

        function render(id) {
            const app = document.getElementById('app');
            
            // Relancer l'animation CSS à chaque nouvelle question
            app.classList.remove('fade-slide');
            void app.offsetWidth; 
            app.classList.add('fade-slide');

            // Si c're l'écran final (Pitch)
            if(id.startsWith('RESULT')) return showVerdict(id);

            const data = auditData.questions[id];
            
            // Si c'est un "Strike" (Vérité brutale), on change le design
            if (data.isStrike) {
                app.innerHTML = `
                    <div class="card fade-slide">
                        <span class="question-id">${data.tag}</span>
                        <h2 class="strike-text">"${data.text}"</h2>
                        <div class="options" style="margin-top: 3rem;">
                            ${data.options.map(o => `<button class="option center-btn" onclick="nextStep('${o.next}')">${o.text}</button>`).join('')}
                        </div>
                    </div>
                `;
            } else {
                // Rendu standard de question
                app.innerHTML = `
                    <div class="card fade-slide">
                        <span class="question-id">${data.tag}</span>
                        <h2>${data.text}</h2>
                        <div class="options">
                            ${data.options.map(o => `<button class="option" onclick="nextStep('${o.next}')">[ ${o.text} ]</button>`).join('')}
                        </div>
                    </div>
                `;
            }
        }

        function nextStep(nextId) {
            stepCount++;
            updateProgress();
            render(nextId);
        }

        function updateProgress() {
            const container = document.getElementById('progress');
            // Création des segments si c'est le début
            if(container.children.length === 0) {
                for(let i=0; i < totalStepsEst; i++) container.innerHTML += '<div class="step-segment"></div>';
            }
            const segments = document.querySelectorAll('.step-segment');
            // Allumer le segment actuel sans dépasser le max
            const currentIndex = Math.min(stepCount - 1, totalStepsEst - 1);
            if(segments[currentIndex]) {
                segments[currentIndex].classList.add('active');
            }
        }

        function showVerdict(type) {
            const app = document.getElementById('app');
            app.classList.remove('fade-slide');
            void app.offsetWidth;
            app.classList.add('fade-slide');

            const res = auditData.results[type];
            app.innerHTML = `
                <div class="card fade-slide" style="text-align: center;">
                    <p class="result-label">VERDICT ARCHITECTE</p>
                    <h2 class="verdict">${res.tag}</h2>
                    <div class="diagnostic-text">${res.diag}</div>
                    <div class="options" style="align-items: center; margin-top: 1rem;">
                        <button class="btn-primary" onclick="window.location.href='${res.url}'">${res.cta}</button>
                    </div>
                </div>
            `;
            
            // Remplir complètement la barre de progression à la fin
            document.querySelectorAll('.step-segment').forEach(seg => seg.classList.add('active'));
        }
    </script>
</body>
</html>
