<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf.OS - Master Script (Bloc 1 & 2)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #050505;
            --border: #1a1a1a;
            --accent-blue: #0070f3;
            --text-question: #ffffff;
            --text-answer: #888888;
            
            /* Tally Balistique Colors */
            --c-vert: #10b981;
            --c-rouge: #ef4444;
            --c-jaune: #eab308;
            --c-gris: #4b5563;

            --font-main: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text-question);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 1.5rem 2.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.9);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo-area h1 { font-size: 0.85rem; letter-spacing: 0.4rem; font-weight: 800; color: #fff; }
        .logo-area p { font-size: 0.6rem; color: var(--accent-blue); text-transform: uppercase; margin-top: 0.3rem; letter-spacing: 2px;}

        .metrics-area { display: flex; align-items: center; gap: 1.5rem; }

        .certitude-box {
            background: #111; border: 1px solid var(--border); padding: 0.5rem 1rem;
            border-radius: 4px; font-family: monospace; font-size: 0.8rem;
            display: flex; align-items: center; gap: 10px;
        }

        .certitude-bar { width: 100px; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
        .certitude-fill { height: 100%; transition: width 0.3s ease, background 0.3s ease; }

        .progress-container { display: flex; justify-content: center; gap: 4px; padding: 20px; max-width: 600px; margin: 0 auto; }
        .step-segment { height: 2px; flex: 1; background: var(--border); transition: 0.4s; }
        .step-segment.active { background: var(--text-answer); }

        .card-wrapper { position: relative; max-width: 700px; width: 90%; margin: 20px auto 60px auto; }
        .nav-controls { display: flex; justify-content: flex-start; margin-bottom: 15px; }
        
        .btn-back {
            background: none; border: none; color: var(--text-answer); cursor: pointer;
            font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            transition: color 0.2s;
        }
        .btn-back:hover { color: #fff; }
        .btn-back[disabled] { opacity: 0; cursor: default; }

        .card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 4rem 3.5rem; border-radius: 6px; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .question-id { 
            display: inline-block; font-size: 0.7rem; color: var(--accent-blue); 
            margin-bottom: 1.5rem; font-family: monospace; letter-spacing: 2px; text-transform: uppercase;
            border: 1px solid var(--accent-blue); padding: 3px 8px; border-radius: 3px;
        }

        h2 { 
            font-size: 1.5rem; font-weight: 400; line-height: 1.5; margin-bottom: 3rem; color: #ffffff;
            border-left: 3px solid var(--border); padding-left: 1.5rem;
        }

        h2.strike-text {
            border-left: 3px solid; padding-left: 1.5rem; font-style: italic; font-weight: 300;
        }
        h2.tension-jaune { border-left-color: var(--c-jaune); color: #fff; }
        h2.tension-rouge { border-left-color: var(--c-rouge); color: #fff; }
        h2.tension-gris { border-left-color: var(--c-gris); color: #ccc; font-style: normal; }

        .options { display: flex; flex-direction: column; gap: 1rem; }

        button.option {
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); color: #ccc;
            padding: 1.2rem 1.5rem; text-align: left; cursor: pointer; font-size: 0.95rem;
            transition: all 0.2s ease; border-radius: 4px; line-height: 1.4; display: flex; align-items: center;
        }

        button.option span.tag { 
            font-size: 0.6rem; font-weight: 800; padding: 0.2rem 0.5rem; border-radius: 3px; 
            margin-right: 15px; letter-spacing: 1px; text-transform: uppercase; min-width: 65px; text-align: center;
        }

        button.option.vert { border-left: 3px solid var(--c-vert); }
        button.option.vert:hover { background: rgba(16,185,129,0.08); border-color: var(--c-vert); color: #fff; transform: translateX(5px); }
        button.option.vert span.tag { background: rgba(16,185,129,0.2); color: var(--c-vert); }

        button.option.rouge { border-left: 3px solid var(--c-rouge); }
        button.option.rouge:hover { background: rgba(239,68,68,0.08); border-color: var(--c-rouge); color: #fff; transform: translateX(5px); }
        button.option.rouge span.tag { background: rgba(239,68,68,0.2); color: var(--c-rouge); }

        button.option.jaune { border-left: 3px solid var(--c-jaune); }
        button.option.jaune:hover { background: rgba(234,179,8,0.08); border-color: var(--c-jaune); color: #fff; transform: translateX(5px); }
        button.option.jaune span.tag { background: rgba(234,179,8,0.2); color: var(--c-jaune); }

        button.option.gris { border-left: 3px solid var(--c-gris); }
        button.option.gris:hover { background: rgba(75,85,99,0.08); border-color: var(--c-gris); color: #fff; transform: translateX(5px); }
        button.option.gris span.tag { background: rgba(75,85,99,0.2); color: var(--c-gris); }

        .fade-slide { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>WOLF.OS</h1>
            <p>Phase 1 & 2</p>
        </div>
        <div class="metrics-area">
            <div class="certitude-box">
                CERTITUDE <span id="score-text">50</span>%
                <div class="certitude-bar">
                    <div id="score-fill" class="certitude-fill" style="width: 50%; background: var(--c-jaune);"></div>
                </div>
            </div>
        </div>
    </header>

    <div class="progress-container" id="progress"></div>
    
    <main id="app">
        <div class="card-wrapper">
            <div class="nav-controls">
                <button class="btn-back" id="btn-back" onclick="goBack()" disabled>← Précédent</button>
            </div>
            <div class="card" id="card-content">
                </div>
        </div>
    </main>

    <script>
        const scriptData = {
            // ==========================================
            // BLOC 1 : COOPÉRATION ET CADRE
            // ==========================================
            "B1_SON": {
                tag: "B1 : LOGISTIQUE",
                typeFormat: "gris",
                text: "Est-ce que l’audio et le son sont OK ?",
                options: [
                    { label: "INFO", text: "Oui, c'est parfait, je vous entends très bien. (Si problème, je le règle)", next: "B1_POURQUOI", score: 0, type: "gris" }
                ]
            },
            "B1_POURQUOI": {
                tag: "B1 : INTENTION",
                typeFormat: "normal",
                text: "Pourquoi avez-vous pris cet appel aujourd'hui ?",
                options: [
                    { label: "VERT", text: "Je veux passer un cap et arrêter de dépendre du hasard.", next: "B1_ACCRED", score: 10, type: "vert" },
                    { label: "JAUNE", text: "Je veux juste savoir combien ça coûte / Je suis curieux.", next: "JAUNE_1", score: -10, type: "jaune" },
                    { label: "ROUGE", text: "C'est vous qui m'avez contacté, allez-y vendez-moi votre truc.", next: "ROUGE_1", score: -15, type: "rouge" }
                ]
            },
            "B1_ACCRED": {
                tag: "B1 : LÉGALITÉS",
                typeFormat: "gris",
                text: "Avant d'entrer dans le vif, je dois valider la structure : vous êtes bien à jour sur vos accréditations SIF, IOBSP et Carte T ?",
                options: [
                    { label: "INFO", text: "Oui, tout est à jour, je suis en totale conformité.", next: "B1_VISIO", score: 0, type: "gris" }
                ]
            },
            "B1_VISIO": {
                tag: "B1 : GÉOGRAPHIE",
                typeFormat: "gris",
                text: "Vous opérez uniquement en local ou vous fermez déjà des dossiers en visio à l'échelle nationale ?",
                options: [
                    { label: "INFO", text: "Je maîtrise la visio, je peux signer partout en France.", next: "B1_CADRE", score: 0, type: "gris" }
                ]
            },
            "B1_CADRE": {
                tag: "B1 : LE CADRE (TENSION)",
                typeFormat: "normal",
                text: "Je fonctionne à la performance et j'investis mon propre budget. Je vais vous poser des questions, j’attends de la coopération pour évaluer la viabilité d’un partenariat. Cela vous parait cohérent ?",
                options: [
                    { label: "VERT", text: "Absolument, l'approche me semble saine.", next: "B1_TRANSITION", score: 10, type: "vert" },
                    { label: "JAUNE", text: "Hésitation / Veut garder le contrôle de l'appel.", next: "JAUNE_1", score: -10, type: "jaune" },
                    { label: "ROUGE", text: "Refus / Arrogance : 'Posez vos questions, on verra'.", next: "ROUGE_1", score: -15, type: "rouge" }
                ]
            },
            "B1_TRANSITION": {
                tag: "TRANSITION ROYALE 1",
                typeFormat: "vert",
                text: "Votre structure est saine. Maintenant, pour que mon investissement soit rentable, je dois comprendre où se situe la friction réelle dans votre rentabilité quotidienne.",
                options: [
                    { label: "SUIVANT", text: "Passer au diagnostic", next: "B2_POURQUOI_PAS", score: 0, type: "vert" }
                ]
            },

            // ==========================================
            // ESCALADES JAUNES (3 NIVEAUX) - LE CADRE
            // ==========================================
            "JAUNE_1": {
                tag: "JAUNE NIVEAU 1 : LA PERFORMANCE",
                typeFormat: "jaune",
                text: "J'investis mon propre budget sur mes partenaires. Avant de parler solution, on va s'assurer que votre structure peut absorber mes flux. On est d'accord sur le principe ?",
                options: [
                    { label: "VERT", text: "Oui, l'audit me semble logique finalement.", next: "B1_SAS", score: 10, type: "vert" },
                    { label: "JAUNE", text: "Toujours bloqué / Impatient.", next: "JAUNE_2", score: -10, type: "jaune" }
                ]
            },
            "JAUNE_2": {
                tag: "JAUNE NIVEAU 2 : LE STORYTELLING",
                typeFormat: "jaune",
                text: "Au début, je prenais tout le monde. Résultat : crash. Leurs cabinets n'avaient pas l'Indice d'Absorption requis. Je refuse de répéter cette erreur. On valide votre châssis ou on s'arrête là ?",
                options: [
                    { label: "VERT", text: "Compris. Mon expérience fait sens, on y va.", next: "B1_SAS", score: 10, type: "vert" },
                    { label: "JAUNE", text: "Refuse l'audit pour se protéger de l'échec.", next: "JAUNE_3", score: -10, type: "jaune" }
                ]
            },
            "JAUNE_3": {
                tag: "JAUNE NIVEAU 3 : LE PARALLÈLE MÉTIER",
                typeFormat: "jaune",
                text: "Vous êtes CGP. Vous ne faites jamais de préconisation sans audit patrimonial. Pourquoi accepterais-je de vous greffer mon système sans auditer votre acquisition ?",
                options: [
                    { label: "VERT", text: "Totalement aligné. On travaille de la même façon.", next: "B1_SAS", score: 10, type: "vert" },
                    { label: "ROUGE", text: "S'en fout / Reste fermé.", next: "DISQUALIFY", score: -50, type: "rouge" }
                ]
            },

            // ==========================================
            // ESCALADES ROUGES (3 NIVEAUX) - L'EGO
            // ==========================================
            "ROUGE_1": {
                tag: "ROUGE NIVEAU 1 : LA RÉALITÉ",
                typeFormat: "rouge",
                text: "Un dirigeant qui va bien ne perd pas 45 min par simple curiosité. La curiosité ne paie pas les factures de votre cabinet, on est d'accord ?",
                options: [
                    { label: "VERT", text: "Baisse la garde. On attaque les vrais sujets.", next: "B1_SAS", score: 10, type: "vert" },
                    { label: "ROUGE", text: "Déni total : 'Tout va bien pour moi'.", next: "ROUGE_2", score: -10, type: "rouge" }
                ]
            },
            "ROUGE_2": {
                tag: "ROUGE NIVEAU 2 : LE PARADOXE",
                typeFormat: "rouge",
                text: "Si tout va parfaitement bien, pourquoi cherchez-vous à modifier votre flux d'acquisition ? Le temps d'un CGP vaut cher, le mien aussi.",
                options: [
                    { label: "VERT", text: "Admet qu'il y a une faille à combler.", next: "B1_SAS", score: 15, type: "vert" },
                    { label: "ROUGE", text: "Devient agressif ou reste sur la défensive.", next: "ROUGE_3", score: -10, type: "rouge" }
                ]
            },
            "ROUGE_3": {
                tag: "ROUGE NIVEAU 3 : L'ULTIMATUM",
                typeFormat: "rouge",
                text: "Je cherche des partenaires d'élite prêts à scaler, pas des touristes de l'information. On joue carte sur table sur vos chiffres ou on raccroche maintenant ?",
                options: [
                    { label: "VERT", text: "Capitulation. OK, parlons chiffres.", next: "B1_SAS", score: 20, type: "vert" },
                    { label: "ROUGE", text: "Refuse de s'ouvrir.", next: "DISQUALIFY", score: -50, type: "rouge" }
                ]
            },

            // SAS DE RETOUR DES ESCALADES
            "B1_SAS": {
                tag: "SAS DE VALIDATION",
                typeFormat: "vert",
                text: "Parfait, l'ego est de côté. Reprenons sur de bonnes bases.",
                options: [
                    { label: "SUIVANT", text: "Continuer le diagnostic", next: "B2_POURQUOI_PAS", score: 0, type: "vert" }
                ]
            },

            // ==========================================
            // BLOC 2 : DOULEUR ET DIAGNOSTIC
            // ==========================================
            "B2_POURQUOI_PAS": {
                tag: "B2 : LE PLAFOND",
                typeFormat: "normal",
                text: "Pourquoi maintenant ? Pourquoi ne pas simplement doubler votre stratégie actuelle ?",
                options: [
                    { label: "VERT", text: "Parce que la recommandation a ses limites et je stagne.", next: "B2_SPE", score: 10, type: "vert" },
                    { label: "JAUNE", text: "Tente de justifier sa stratégie actuelle.", next: "JAUNE_1", score: -10, type: "jaune" },
                    { label: "ROUGE", text: "Pense qu'il lui faut juste plus de temps.", next: "ROUGE_1", score: -15, type: "rouge" }
                ]
            },
            "B2_SPE": {
                tag: "B2 : POSITIONNEMENT",
                typeFormat: "gris",
                text: "Votre spécialité actuelle c'est la valorisation de capital pur ou vous faites de l'ingénierie complexe (Holding, BNC, BIC) ?",
                options: [
                    { label: "INFO", text: "Principalement du capital, mais je veux pivoter vers le complexe.", next: "B2_TICKET", score: 0, type: "gris" }
                ]
            },
            "B2_TICKET": {
                tag: "B2 : L'HÉMORRAGIE (TENSION)",
                typeFormat: "normal",
                text: "Vous faites 4 deals/mois, mais quel est le ticket moyen ? Si vous passez 2h pour un dossier à 4 000 € d'encours, vous brûlez votre temps, on est d'accord ?",
                options: [
                    { label: "VERT", text: "C'est exactement ça, je perds trop de temps sur des dossiers non rentables.", next: "B2_DUREE", score: 15, type: "vert" },
                    { label: "JAUNE", text: "Minimise le problème de rentabilité horaire.", next: "JAUNE_1", score: -10, type: "jaune" },
                    { label: "ROUGE", text: "Refuse d'admettre la perte de temps.", next: "ROUGE_1", score: -15, type: "rouge" }
                ]
            },
            "B2_DUREE": {
                tag: "B2 : L'URGENCE",
                typeFormat: "gris",
                text: "Depuis combien de temps ce blocage persiste-t-il et comment affecte-t-il spécifiquement votre croissance ?",
                options: [
                    { label: "INFO", text: "Ça fait six mois, mon chiffre d'affaires plafonne.", next: "B2_TRANSITION", score: 0, type: "gris" }
                ]
            },
            "B2_TRANSITION": {
                tag: "TRANSITION ROYALE 2",
                typeFormat: "vert",
                text: "On a identifié l'hémorragie financière. Logiquement, un entrepreneur comme vous n'est pas resté les bras croisés ; voyons ce que vous avez déjà tenté pour stopper ça.",
                options: [
                    { label: "FIN", text: "Fin de l'étape 1 du code.", next: "END", score: 0, type: "vert" }
                ]
            },

            "DISQUALIFY": {
                tag: "FIN D'APPEL (DISQUALIFIÉ)",
                typeFormat: "rouge",
                text: "Incompatibilité de cadre ou de structure. Le Loup ne quémande pas de partenaire.",
                options: []
            },
            "END": {
                tag: "FIN PARTIE 1",
                typeFormat: "vert",
                text: "Transition vers le Bloc 3 validée.",
                options: []
            }
        };

        // VARIABLES D'ÉTAT
        let currentId = "B1_SON";
        let score = 50; 
        let historyStack = [];

        // UI UPDATES
        function updateScoreUI() {
            let clampedScore = Math.max(0, Math.min(100, score));
            document.getElementById('score-text').innerText = clampedScore;
            
            const fill = document.getElementById('score-fill');
            fill.style.width = clampedScore + '%';
            
            if(clampedScore < 40) fill.style.background = "var(--c-rouge)";
            else if(clampedScore < 70) fill.style.background = "var(--c-jaune)";
            else fill.style.background = "var(--c-vert)";
        }

        function updateProgressUI() {
            const container = document.getElementById('progress');
            if(container.children.length === 0) {
                for(let i=0; i < 7; i++) container.innerHTML += '<div class="step-segment"></div>';
            }
            const segments = document.querySelectorAll('.step-segment');
            segments.forEach(s => s.classList.remove('active'));
            
            let activeCount = Math.min(historyStack.length + 1, 7);
            for(let i=0; i < activeCount; i++) {
                if(segments[i]) segments[i].classList.add('active');
            }
            document.getElementById('btn-back').disabled = historyStack.length === 0;
        }

        // RENDER LOGIC
        function render() {
            const content = document.getElementById('card-content');
            content.classList.remove('fade-slide');
            void content.offsetWidth; 
            content.classList.add('fade-slide');

            const data = scriptData[currentId];

            if (currentId === "DISQUALIFY" || currentId === "END") {
                content.innerHTML = `
                    <span class="question-id">VERDICT</span>
                    <h2 class="strike-text tension-${data.typeFormat}" style="border-left-color: transparent; text-align:center;">
                        ${data.tag}
                    </h2>
                    <p style="color: #ccc; text-align:center; font-size:1.1rem; margin-top:2rem;">${data.text}</p>
                `;
                return;
            }

            let titleClass = '';
            if(data.typeFormat === 'jaune') titleClass = 'class="strike-text tension-jaune"';
            if(data.typeFormat === 'rouge') titleClass = 'class="strike-text tension-rouge"';
            if(data.typeFormat === 'gris') titleClass = 'class="tension-gris"';
            if(data.typeFormat === 'vert') titleClass = 'class="strike-text tension-vert"';
            
            content.innerHTML = `
                <span class="question-id">${data.tag}</span>
                <h2 ${titleClass}>"${data.text}"</h2>
                <div class="options">
                    ${data.options.map(o => `
                        <button class="option ${o.type}" onclick="handleNext('${o.next}', ${o.score})">
                            <span class="tag">${o.label}</span> ${o.text}
                        </button>
                    `).join('')}
                </div>
            `;
            
            updateScoreUI();
            updateProgressUI();
        }

        function handleNext(nextId, scoreImpact) {
            historyStack.push({ id: currentId, score: score });
            currentId = nextId;
            score += scoreImpact;
            render();
        }

        function goBack() {
            if(historyStack.length === 0) return;
            const prevState = historyStack.pop();
            currentId = prevState.id;
            score = prevState.score;
            render();
        }

        // INIT
        render();

    </script>
</body>
</html>
