<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montis Media - Cleaner</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .upload-card { border: 1px dashed rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.03); transition: all 0.3s ease; }
        .upload-card:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center px-6">

    <div class="w-full max-w-xl text-center space-y-8">
        <div class="space-y-4">
            <h1 class="text-sm font-bold text-blue-500 uppercase tracking-[0.4em]">Montis Media DB</h1>
            <p class="text-2xl font-light text-gray-300">Nettoyeur & Séparateur de Leads</p>
        </div>

        <label for="csv-file" class="upload-card block p-16 cursor-pointer rounded-sm">
            <svg class="w-10 h-10 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
            <span id="file-name" class="text-lg font-light text-gray-400">Clique ou glisse ton CSV ici</span>
            <input type="file" id="csv-file" accept=".csv" class="hidden">
        </label>

        <button onclick="processFile()" id="process-btn" class="hidden w-full py-4 border border-white/20 text-xs uppercase tracking-[0.3em] hover:bg-white hover:text-black transition-all">
            Nettoyer le fichier
        </button>
        
        <p id="status-message" class="text-sm text-gray-500 font-light mt-4 h-4"></p>
    </div>

    <script>
        const fileInput = document.getElementById('csv-file');
        const fileNameDisplay = document.getElementById('file-name');
        const processBtn = document.getElementById('process-btn');
        const statusMsg = document.getElementById('status-message');

        // Quand on sélectionne un fichier
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileNameDisplay.innerText = e.target.files[0].name;
                fileNameDisplay.classList.add('text-white');
                processBtn.classList.remove('hidden');
                statusMsg.innerText = "";
            }
        });

        // Fonction d'envoi à Vercel
        async function processFile() {
            if (fileInput.files.length === 0) return;

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);

            // UI Feedback
            processBtn.innerText = "Traitement en cours (Pandas x Supabase)...";
            processBtn.classList.add('opacity-50', 'cursor-not-allowed');
            processBtn.disabled = true;
            statusMsg.innerText = "Analyse, nettoyage et déduplication en cours...";

            try {
                // Appel vers ton script Python sur Vercel
                const response = await fetch('/api/cleaner', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    // Si Vercel renvoie le ZIP
                    const blob = await response.blob();
                    
                    if (blob.type === "application/json") {
                        // S'il n'y a plus de leads (tous filtrés)
                        const text = await blob.text();
                        const data = JSON.parse(text);
                        statusMsg.innerText = data.message || "Fichier vide après filtrage.";
                    } else {
                        // Téléchargement du ZIP
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = "leads_nettoyes_split.zip";
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                        window.URL.revokeObjectURL(url);
                        
                        statusMsg.innerText = "✅ Fichier ZIP téléchargé avec succès !";
                        statusMsg.classList.replace('text-gray-500', 'text-green-500');
                    }
                } else {
                    const err = await response.json();
                    statusMsg.innerText = "❌ Erreur : " + (err.error || "Problème serveur.");
                    statusMsg.classList.replace('text-gray-500', 'text-red-500');
                }
            } catch (error) {
                console.error(error);
                statusMsg.innerText = "❌ Erreur de connexion avec l'API.";
                statusMsg.classList.replace('text-gray-500', 'text-red-500');
            } finally {
                // Reset bouton
                processBtn.innerText = "Nettoyer un autre fichier";
                processBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                processBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
