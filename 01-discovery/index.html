<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf.OS - Tally Balistique</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #050505;
            --border: #1a1a1a;
            --accent-blue: #0070f3;
            --text-question: #ffffff;
            --text-answer: #888888;
            
            /* Tally Balistique Colors */
            --c-vert: #10b981;
            --c-rouge: #ef4444;
            --c-jaune: #eab308;
            --c-violet: #a855f7;
            --c-gris: #4b5563;

            --font-main: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text-question);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HEADER & METRICS */
        header {
            padding: 1.5rem 2.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo-area h1 { font-size: 0.85rem; letter-spacing: 0.4rem; font-weight: 800; color: #fff; }
        .logo-area p { font-size: 0.6rem; color: var(--accent-blue); text-transform: uppercase; margin-top: 0.3rem; letter-spacing: 2px;}

        .metrics-area {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .certitude-box {
            background: #111;
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.8rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .certitude-bar {
            width: 100px; height: 6px; background: #333; border-radius: 3px; overflow: hidden;
        }
        .certitude-fill {
            height: 100%; transition: width 0.3s ease, background 0.3s ease;
        }

        /* PROGRESS SEGMENTS */
        .progress-container { display: flex; justify-content: center; gap: 4px; padding: 20px; max-width: 600px; margin: 0 auto; }
        .step-segment { height: 2px; flex: 1; background: var(--border); transition: 0.4s; }
        .step-segment.active { background: var(--text-answer); }

        /* MAIN CARD */
        .card-wrapper {
            position: relative;
            max-width: 700px;
            width: 90%;
            margin: 20px auto 60px auto;
        }

        .nav-controls {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 15px;
        }

        .btn-back {
            background: none; border: none; color: var(--text-answer); cursor: pointer;
            font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            transition: color 0.2s;
        }
        .btn-back:hover { color: #fff; }
        .btn-back[disabled] { opacity: 0; cursor: default; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 4rem 3.5rem;
            border-radius: 6px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .question-id { 
            display: block; font-size: 0.7rem; color: var(--accent-blue); 
            margin-bottom: 1.5rem; font-family: monospace; letter-spacing: 2px; text-transform: uppercase;
        }

        h2 { 
            font-size: 1.6rem; font-weight: 400; line-height: 1.5; margin-bottom: 3rem; color: #ffffff;
            letter-spacing: -0.01em; border-left: 3px solid var(--border); padding-left: 1.5rem;
        }

        h2.strike-text {
            border-left: none; padding-left: 0; color: #fff; font-style: italic; font-weight: 300; font-size: 1.6rem; text-align: left;
            border-left: 3px solid var(--c-jaune);
        }

        /* BUTTONS COLOR CODING */
        .options { display: flex; flex-direction: column; gap: 1rem; }

        button.option {
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); color: #ccc;
            padding: 1.2rem 1.5rem; text-align: left; cursor: pointer; font-size: 0.95rem;
            transition: all 0.2s ease; border-radius: 4px; line-height: 1.4; display: flex; align-items: center;
        }

        button.option span.tag { 
            font-size: 0.6rem; font-weight: 800; padding: 0.2rem 0.5rem; border-radius: 3px; 
            margin-right: 15px; letter-spacing: 1px; text-transform: uppercase; min-width: 65px; text-align: center;
        }

        /* Hover & Borders based on tags */
        button.option.vert { border-left: 3px solid var(--c-vert); }
        button.option.vert:hover { background: rgba(16,185,129,0.08); border-color: var(--c-vert); color: #fff; transform: translateX(5px); }
        button.option.vert span.tag { background: rgba(16,185,129,0.2); color: var(--c-vert); }

        button.option.rouge { border-left: 3px solid var(--c-rouge); }
        button.option.rouge:hover { background: rgba(239,68,68,0.08); border-color: var(--c-rouge); color: #fff; transform: translateX(5px); }
        button.option.rouge span.tag { background: rgba(239,68,68,0.2); color: var(--c-rouge); }

        button.option.jaune { border-left: 3px solid var(--c-jaune); }
        button.option.jaune:hover { background: rgba(234,179,8,0.08); border-color: var(--c-jaune); color: #fff; transform: translateX(5px); }
        button.option.jaune span.tag { background: rgba(234,179,8,0.2); color: var(--c-jaune); }

        button.option.violet { border-left: 3px solid var(--c-violet); }
        button.option.violet:hover { background: rgba(168,85,247,0.08); border-color: var(--c-violet); color: #fff; transform: translateX(5px); }
        button.option.violet span.tag { background: rgba(168,85,247,0.2); color: var(--c-violet); }

        button.option.gris { border-left: 3px solid var(--c-gris); }
        button.option.gris:hover { background: rgba(75,85,99,0.08); border-color: var(--c-gris); color: #fff; transform: translateX(5px); }
        button.option.gris span.tag { background: rgba(75,85,99,0.2); color: var(--c-gris); }

        .fade-slide { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>WOLF.OS</h1>
            <p>Master Script</p>
        </div>
        <div class="metrics-area">
            <div class="certitude-box">
                CERTITUDE <span id="score-text">50</span>%
                <div class="certitude-bar">
                    <div id="score-fill" class="certitude-fill" style="width: 50%; background: var(--c-jaune);"></div>
                </div>
            </div>
        </div>
    </header>

    <div class="progress-container" id="progress"></div>
    
    <main id="app">
        <div class="card-wrapper">
            <div class="nav-controls">
                <button class="btn-back" id="btn-back" onclick="goBack()" disabled>← Précédent</button>
            </div>
            <div id="card-content">
                </div>
        </div>
    </main>

    <script>
        // ARCHITECTURE LOGIQUE (STATE MACHINE)
        const scriptData = {
            "START": {
                tag: "BLOC 1 : CADRE",
                text: "Est-ce que le son est OK ? [...] D'après votre expérience, quelle serait la manière la plus utile de passer cet appel ?",
                options: [
                    { label: "VERT", text: "Donc vous voulez qu'on arrête de s'en remettre au hasard ?", next: "B1_LOGISTIQUE", score: 10, type: "vert" },
                    { label: "VIOLET", text: "Donc c'est une urgence vitale de restructurer le flux ?", next: "B2_Q1", score: 30, type: "violet" },
                    { label: "JAUNE", text: "Donc le cadre ne vous convient pas, vous voulez juste des prix ?", next: "B1_JAUNE_L1", score: -10, type: "jaune" },
                    { label: "ROUGE", text: "Donc vous êtes juste curieux, sans besoin précis ?", next: "B1_ROUGE", score: -10, type: "rouge" }
                ]
            },

            // --- ESCALADE JAUNE (BLOC 1) ---
            "B1_JAUNE_L1": {
                tag: "JAUNE N1 : LA PERFORMANCE",
                isStrike: true,
                text: "J'investis mon propre budget sur mes partenaires. Avant de parler tarification, on va s'assurer que votre structure peut absorber mes flux. On est d'accord sur le principe ?",
                options: [
                    { label: "VERT", text: "Donc l'audit vous semble logique finalement ?", next: "B1_SAS", score: 10, type: "vert" },
                    { label: "JAUNE", text: "Donc le principe de l'audit vous bloque toujours ?", next: "B1_JAUNE_L2", score: -10, type: "jaune" }
                ]
            },
            "B1_JAUNE_L2": {
                tag: "JAUNE N2 : LE STORYTELLING",
                isStrike: true,
                text: "Au début, je prenais tout le monde. Résultat : crash. Leurs cabinets n'avaient pas l'Indice d'Absorption requis. Je refuse de répéter cette erreur. On valide votre châssis ou on s'arrête là ?",
                options: [
                    { label: "VERT", text: "Donc mon expérience fait sens, on y va ?", next: "B1_SAS", score: 10, type: "vert" },
                    { label: "JAUNE", text: "Donc même pour vous protéger d'un échec, vous refusez ?", next: "B1_JAUNE_L3", score: -10, type: "jaune" }
                ]
            },
            "B1_JAUNE_L3": {
                tag: "JAUNE N3 : LE PARALLÈLE MÉTIER",
                isStrike: true,
                text: "Jérémy, vous êtes CGP. Vous ne faites jamais de préconisation sans audit patrimonial. Pourquoi accepterais-je de vous greffer mon système sans auditer votre acquisition ?",
                options: [
                    { label: "VERT", text: "Donc on est d'accord qu'on travaille de la même façon ?", next: "B1_SAS", score: 10, type: "vert" },
                    { label: "ROUGE", text: "Le prospect dit explicitement : Je m'en fous.", next: "DISQUALIFY", score: -50, type: "rouge" }
                ]
            },

            // --- ESCALADE ROUGE (BLOC 1) ---
            "B1_ROUGE": {
                tag: "ROUGE : LE DÉNI",
                text: "Un dirigeant qui va bien ne perd pas 45min par curiosité. La curiosité ne paie pas les factures de votre cabinet, on est d'accord ?",
                options: [
                    { label: "VERT", text: "Donc on parle vrai et on attaque les vrais sujets ?", next: "B1_SAS", score: 10, type: "vert" },
                    { label: "JAUNE", text: "Le prospect s'énerve / Attaque ma façon de parler.", next: "B1_JAUNE_L1", score: -10, type: "jaune" } // Passerelle de rébellion
                ]
            },

            // --- SAS DE VALIDATION ---
            "B1_SAS": {
                tag: "SAS DE VALIDATION",
                text: "Parfait, l'ego est de côté. Donc fondamentalement, qu'est-ce qui coince dans votre acquisition pour que vous ayez validé cet appel ?",
                options: [
                    { label: "VERT", text: "Donc vous voulez passer un vrai cap ?", next: "B1_LOGISTIQUE", score: 10, type: "vert" }
                ]
            },

            "B1_LOGISTIQUE": {
                tag: "BLOC 1 : QUALIFICATION",
                text: "Logistique rapide : vos accréditations (Carte T, IOBSP) sont à jour, et vous maîtrisez la visio nationale ?",
                options: [
                    { label: "GRIS", text: "Donc logistiquement vous êtes opérationnel ?", next: "B2_Q1", score: 0, type: "gris" },
                    { label: "ROUGE", text: "Donc vous êtes bloqué au niveau légal/géographique ?", next: "DISQUALIFY", score: -50, type: "rouge" }
                ]
            },

            // --- BLOC 2 : DOULEUR ---
            "B2_Q1": {
                tag: "BLOC 2 : PLAFOND DE VERRE",
                text: "Oublions la théorie. Pourquoi ne pas simplement faire X2 sur votre stratégie actuelle (recommandation/bouche-à-oreille) ?",
                options: [
                    { label: "VERT", text: "Donc vous admettez que le réseau a ses limites ?", next: "B2_Q2", score: 10, type: "vert" },
                    { label: "ROUGE", text: "Donc vous pensez que c'est juste un manque de temps ?", next: "B2_ROUGE", score: -10, type: "rouge" }
                ]
            },
            "B2_ROUGE": {
                tag: "ROUGE N1 : LA LOGIQUE",
                text: "Si c'était du temps, vous auriez délégué. Doubler du hasard, ça donne juste deux fois plus de hasard. On est d'accord que votre flux n'est pas prédictible ?",
                options: [
                    { label: "VERT", text: "Donc vous reconnaissez l'instabilité de la méthode ?", next: "B2_Q2", score: 10, type: "vert" },
                    { label: "JAUNE", text: "Le prospect s'énerve d'être bousculé sur sa stratégie.", next: "B1_JAUNE_L2", score: -10, type: "jaune" } // Passerelle
                ]
            },
            "B2_Q2": {
                tag: "BLOC 2 : LE TICKET MOYEN",
                text: "Vous faites 4 deals/mois, mais quel ticket moyen ? Si vous passez 2h pour un petit dossier à 4000€, vous brûlez votre rentabilité horaire, non ?",
                options: [
                    { label: "VERT", text: "Donc les petits dossiers sont un vrai fardeau ?", next: "B2_Q3", score: 10, type: "vert" },
                    { label: "VIOLET", text: "Donc c'est un enfer, on coupe tout le bas de gamme ?", next: "B3_Q1", score: 30, type: "violet" }
                ]
            },
            "B2_Q3": {
                tag: "BLOC 2 : URGENCE",
                text: "Depuis combien de temps ce goulot d'étranglement bloque techniquement la croissance du cabinet ?",
                options: [
                    { label: "VERT", text: "Donc l'hémorragie dure depuis plus de 6 mois ?", next: "B3_Q1", score: 10, type: "vert" }
                ]
            },

            // --- BLOC 3 : LEAD KILLING (SEARCH & DESTROY) ---
            "B3_Q1": {
                tag: "BLOC 3 : LEAD KILLING (RÉSEAU)",
                text: "Pour régler ça, beaucoup comptent sur les partenariats d'affaires. C'est votre cas ou vous savez que ce n'est pas scalable ?",
                options: [
                    { label: "VERT", text: "Donc on valide que le partenariat est une impasse lente ?", next: "B3_Q2", score: 10, type: "vert" },
                    { label: "ROUGE", text: "Donc vous espérez encore que les apporteurs vont vous sauver ?", next: "B3_KILL_1", score: -10, type: "rouge" }
                ]
            },
            "B3_KILL_1": {
                tag: "DESTROY N1 : L'ATTENTE",
                isStrike: true,
                text: "Attendre que quelqu'un d'autre vous envoie des dossiers n'est pas une stratégie, c'est une prière. Pendant ce temps, vos concurrents automatisent. On élimine cette illusion de vos plans ?",
                options: [
                    { label: "VERT", text: "Donc on est d'accord qu'il faut être proactif ?", next: "B3_Q2", score: 10, type: "vert" }
                ]
            },
            "B3_Q2": {
                tag: "BLOC 3 : LEAD KILLING (TECH)",
                text: "Et côté tech ? Prospection LinkedIn ou achat de fiches de leads partagées... Vous avez testé ces gouffres ?",
                options: [
                    { label: "VERT", text: "Donc on est d'accord : chronophage et non-qualifié ?", next: "B3_Q3", score: 10, type: "vert" },
                    { label: "ROUGE", text: "Donc vous songez encore à acheter des fiches classiques ?", next: "B3_KILL_2", score: -10, type: "rouge" }
                ]
            },
            "B3_KILL_2": {
                tag: "DESTROY N2 : LA GUERRE DES PRIX",
                isStrike: true,
                text: "Acheter une fiche vendue à 5 autres CGP, c'est se battre dans la boue sur les honoraires. Vous voulez être perçu comme le choix par défaut ou l'expert exclusif ?",
                options: [
                    { label: "VERT", text: "Donc on tire un trait sur les méthodes low-cost ?", next: "B3_Q3", score: 10, type: "vert" }
                ]
            },
            "B3_Q3": {
                tag: "CERTITUDE ZÉRO (CHECKPOINT)",
                text: "Pour être clair : aujourd'hui, vous n'avez absolument aucun moteur prédictible et industriel pour aller chercher vos 5 BNC par mois. C'est le constat ?",
                options: [
                    { label: "VERT", text: "Donc ma solution est la seule voie restante sur la table ?", next: "B4_Q1", score: 10, type: "vert" },
                    { label: "JAUNE", text: "Le prospect tente de fuir la conclusion / S'énerve.", next: "B1_JAUNE_L3", score: -10, type: "jaune" } // Passerelle Métier
                ]
            },

            // --- BLOC 4 : DÉSIR ---
            "B4_Q1": {
                tag: "BLOC 4 : HÉRITAGE",
                text: "Si on branche la machine, qu'est-ce que cet argent vous permet de faire sur le plan personnel ? Solder la maison, sécuriser la famille ?",
                options: [
                    { label: "VERT", text: "Donc votre vrai moteur, c'est la sécurité des proches ?", next: "B5_Q1", score: 10, type: "vert" }
                ]
            },

            // --- BLOC 5 : RÉALITÉ ---
            "B5_Q1": {
                tag: "BLOC 5 : AUDIT STRUCTURE",
                text: "Si je vous envoie 20 dirigeants par mois demain matin, vous gérez ça comment ? Vous avez un CRM blindé ou vous êtes encore sur Excel ?",
                options: [
                    { label: "VERT", text: "Donc on valide que votre outil actuel va exploser en vol ?", next: "B6_Q1", score: 10, type: "vert" },
                    { label: "ROUGE", text: "Donc vous pensez que l'artisanal tiendra le choc ?", next: "B5_ROUGE", score: -10, type: "rouge" }
                ]
            },
            "B5_ROUGE": {
                tag: "ROUGE N1 : LE SUICIDE",
                text: "Gérer 20 leads haut de gamme à la main, c'est du suicide commercial. Sans relance auto, vous brûlez mon investissement. On est d'accord qu'il faut se structurer ?",
                options: [
                    { label: "VERT", text: "Donc vous êtes prêt à moderniser le back-office ?", next: "B6_Q1", score: 10, type: "vert" }
                ]
            },

            // --- BLOC 6 : PITCH ---
            "B6_Q1": {
                tag: "BLOC 6 : VERROUILLAGE FINAL",
                text: "Le diagnostic est clair. Votre acquisition est artisanale et le goulot vous coûte des dizaines de milliers d'euros. C'est le résumé exact ?",
                options: [
                    { label: "VERT", text: "Donc on est 100% alignés sur la maladie ?", next: "B6_Q2", score: 10, type: "vert" }
                ]
            },
            "B6_Q2": {
                tag: "BLOC 6 : LA PERMISSION",
                text: "Je pense qu'on a le fit. Je peux vous montrer précisément comment ma mécanique va vous emmener de A vers B. Ça vous va ?",
                options: [
                    { label: "VERT", text: "Donc vous m'accordez l'attention pour le remède ?", next: "PITCH", score: 10, type: "vert" },
                    { label: "JAUNE", text: "Donc vous voulez les prix avant même de voir le moteur ?", next: "B1_JAUNE_L1", score: -10, type: "jaune" } // Renvoi vers la presse hydraulique
                ]
            },

            "DISQUALIFY": {
                tag: "FIN D'APPEL",
                text: "Prospect disqualifié. Incompatibilité de cadre ou de structure. On ne quémande pas.",
                options: []
            },
            "PITCH": {
                tag: "LANCEMENT DU PITCH",
                text: "Transition validée à 10/10. Lancement de la Présentation de la Master Infrastructure.",
                options: []
            }
        };

        // VARIABLES D'ÉTAT
        let currentId = "START";
        let score = 50; 
        let historyStack = [];

        // METTRE À JOUR LE SCORE UI
        function updateScoreUI() {
            let clampedScore = Math.max(0, Math.min(100, score));
            document.getElementById('score-text').innerText = clampedScore;
            
            const fill = document.getElementById('score-fill');
            fill.style.width = clampedScore + '%';
            
            if(clampedScore < 40) fill.style.background = "var(--c-rouge)";
            else if(clampedScore < 70) fill.style.background = "var(--c-jaune)";
            else fill.style.background = "var(--c-vert)";
        }

        function updateProgressUI() {
            const container = document.getElementById('progress');
            if(container.children.length === 0) {
                for(let i=0; i < 7; i++) container.innerHTML += '<div class="step-segment"></div>';
            }
            const segments = document.querySelectorAll('.step-segment');
            segments.forEach(s => s.classList.remove('active'));
            
            // Estimation basique de progression
            let activeCount = Math.min(historyStack.length + 1, 7);
            for(let i=0; i < activeCount; i++) {
                if(segments[i]) segments[i].classList.add('active');
            }

            // Activer bouton back
            document.getElementById('btn-back').disabled = historyStack.length === 0;
        }

        // RENDU DE LA CARTE
        function render() {
            const content = document.getElementById('card-content');
            content.classList.remove('fade-slide');
            void content.offsetWidth; 
            content.classList.add('fade-slide');

            const data = scriptData[currentId];

            if (currentId === "DISQUALIFY" || currentId === "PITCH") {
                content.innerHTML = `
                    <span class="question-id">VERDICT DU SYSTÈME</span>
                    <h2 class="strike-text" style="color: ${currentId === 'PITCH' ? 'var(--c-vert)' : 'var(--c-rouge)'}; border-left-color: transparent; text-align:center;">
                        ${data.tag}
                    </h2>
                    <p style="color: #ccc; text-align:center; font-size:1.1rem; margin-top:2rem;">${data.text}</p>
                `;
                return;
            }

            let titleClass = data.isStrike ? 'class="strike-text"' : '';
            
            content.innerHTML = `
                <span class="question-id">${data.tag}</span>
                <h2 ${titleClass}>"${data.text}"</h2>
                <div class="options">
                    ${data.options.map((o, idx) => `
                        <button class="option ${o.type}" onclick="handleNext('${o.next}', ${o.score})">
                            <span class="tag">${o.label}</span> ${o.text}
                        </button>
                    `).join('')}
                </div>
            `;
            
            updateScoreUI();
            updateProgressUI();
        }

        function handleNext(nextId, scoreImpact) {
            historyStack.push({ id: currentId, score: score });
            currentId = nextId;
            score += scoreImpact;
            render();
        }

        function goBack() {
            if(historyStack.length === 0) return;
            const prevState = historyStack.pop();
            currentId = prevState.id;
            score = prevState.score;
            render();
        }

        // INITIALISATION
        render();

    </script>
</body>
</html>
